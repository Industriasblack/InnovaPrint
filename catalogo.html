<!DOCTYPE html>

<meta charset="UTF-8">
<title>Catálogo | InnovaPrint</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #f1f5f9;
}

/* HEADER */
header {
    background: rgba(15, 23, 42, 0.9);
    color: #fff;
    padding: 18px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: #fff;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
}

/* SECCION */
.catalogo-section {
    padding: 80px 20px;
    text-align: center;
}

.catalogo-section h1 {
    font-size: 48px;
    color: #0f172a;
}

.catalogo-section p {
    margin-top: 10px;
    color: #475569;
}

/* GRID */
.catalogo {
    margin-top: 50px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
}

/* CARD */
.producto {
    background: #fff;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,.15);
    transition: .3s;
}

.producto:hover {
    transform: translateY(-10px) scale(1.03);
}

/* 🔥 IMAGENES PERFECTAS */
.producto img {
    width: 100%;
    height: 200px;
    object-fit: cover; /* clave */
    border-radius: 12px;
}

/* TEXTO */
.nombre {
    margin-top: 15px;
    font-size: 18px;
    color: #0f172a;
}

.precio {
    color: #2563eb;
    font-weight: bold;
}

/* BOTON */
.btn {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #1d4ed8;
}

</style>
</head>
